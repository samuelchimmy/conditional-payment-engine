name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy discord-oauth
        run: supabase functions deploy discord-oauth --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt

      - name: Deploy secure-claim
        run: supabase functions deploy secure-claim --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt

      - name: Deploy social-identity
        run: supabase functions deploy social-identity --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt

      - name: Deploy auth-session
        run: supabase functions deploy auth-session --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt

      - name: Deploy db-proxy
        run: supabase functions deploy db-proxy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt

      - name: Deploy notifications
        run: supabase functions deploy notifications --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt
